{% load static %}

<html>

<head>

    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(-45deg, #1e3a8a, #2563eb, #9333ea, #ec4899);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .navbar {
            background: #1e40af;
        }

        .sidebar {
            height: 100vh;
            background: white;
            padding-top: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #333;
        }

        .sidebar a:hover {
            background: #f1f5f9;
        }

        .dashboard-card {
            border: none;
            border-radius: 15px;
            padding: 20px;
            background: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-dark">

        <div class="container-fluid">

            <span class="navbar-brand">
                <img src="{% static 'images/COMSATS.jpeg' %}" width="45" class="rounded-circle">
                COMSATS Transport Admin
            </span>

            <div>

                <a href="{% url 'logout' %}" class="btn btn-light">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>

            </div>

        </div>

    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->

            <div class="col-md-2 sidebar">

                <a href="{% url 'admin_dashboard' %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>

                <a href="{% url 'admin_students' %}">
                    <i class="bi bi-people"></i> Students
                </a>

                <a href="{% url 'admin_drivers' %}">
                    <i class="bi bi-person-badge"></i> Drivers
                </a>

                <a href="{% url 'admin_buses' %}">
                    <i class="bi bi-bus-front"></i> Buses
                </a>

                <a href="{% url 'admin_routes' %}">
                    <i class="bi bi-signpost"></i> Routes
                </a>

                <a href="{% url 'admin_attendance' %}">
                    <i class="bi bi-calendar-check"></i> Attendance
                </a>

                <a href="{% url 'admin_complaints' %}">
                    <i class="bi bi-chat-left-text"></i> Complaints
                </a>

                <a href="{% url 'admin_announcements' %}">
                    <i class="bi bi-megaphone"></i> Announcements
                </a>

            </div>

            <!-- Page Content -->

            <div class="col-md-10 p-4">

                {% block content %}

                {% endblock %}

            </div>

        </div>

    </div>

</body>

</html>
