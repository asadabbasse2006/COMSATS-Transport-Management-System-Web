{% extends 'admin_base.html' %}

{% block content %}

<h4>Edit Bus</h4>

<div class="dashboard-card">

<form method="POST">
{% csrf_token %}

<div class="mb-3">

<label>Bus Number</label>

<input type="text"
name="bus_number"
value="{{ bus.bus_number }}"
class="form-control">

</div>

<div class="mb-3">

<label>Capacity</label>

<input type="number"
name="capacity"
value="{{ bus.capacity }}"
class="form-control">

</div>

<button class="btn btn-primary">
Update Bus
</button>

</form>

</div>

{% endblock %}
