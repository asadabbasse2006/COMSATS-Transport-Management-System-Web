{% extends 'admin_base.html' %}

{% block content %}

<h4>Drivers Management</h4>

<div class="dashboard-card">

<table class="table">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Assigned Bus</th>
</tr>

{% for driver in drivers %}

<tr>

<td>{{ driver.user.get_full_name }}</td>
<td>{{ driver.phone }}</td>
<td>{{ driver.assigned_bus }}</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
