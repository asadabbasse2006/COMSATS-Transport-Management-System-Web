{% extends 'admin_base.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">
<h4>Buses Management</h4>

<a href="{% url 'add_bus' %}" class="btn btn-primary">
<i class="bi bi-plus-circle"></i> Add Student
</a>

</div>

<div class="dashboard-card">

<table class="table">

<thead>
<tr>
<th>Name</th>
<th>Registration</th>
<th>Route</th>
<th>Fee Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody>

{% for student in students %}

<tr>

<td>{{ student.user.get_full_name }}</td>
<td>{{ student.reg_number }}</td>
<td>{{ student.route }}</td>
<td>{{ student.fee_status }}</td>

<td>

<a href="{% url 'edit_bus' bus.id %}" class="btn btn-warning btn-sm">
<i class="bi bi-pencil"></i>
</a>

<a href="{% url 'delete_bus' bus.id %}" class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
